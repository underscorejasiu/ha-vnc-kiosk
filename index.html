<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HA VNC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #noVNC_canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="noVNC_canvas">Canvas not supported.</canvas>

  <script src="include/util.js"></script>
  <script src="include/webutil.js"></script>
  <script src="include/base64.js"></script>
  <script src="include/websock.js"></script>
  <script src="include/des.js"></script>
  <script src="include/keysym.js"></script>
  <script src="include/keysymdef.js"></script>
  <script src="include/keyboard.js"></script>
  <script src="include/input.js"></script>
  <script src="include/display.js"></script>
  <script src="include/jsunzip.js"></script>
  <script src="include/rfb.js"></script>

  <script>
    window.onload = function () {
      var host = window.location.hostname;
      var port = window.location.port || '6080';
      var path = 'websockify';

      var rfb = new RFB({
        target: document.getElementById('noVNC_canvas'),
        onUpdateState: function (rfb, state, oldstate, msg) {
          console.log('[noVNC] ' + state + ': ' + msg);
        },
        onXvpInit: function () {}
      });

      rfb.connect(host, port, '', path);
    };
  </script>
</body>
</html>
