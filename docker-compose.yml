services:
  ha-vnc-kiosk:
    build: .
    container_name: ha-vnc-kiosk
    environment:
      - HA_URL=${HA_URL}
      - HA_USERNAME=${HA_USERNAME:-}
      - HA_PASSWORD=${HA_PASSWORD:-}
      - SCREEN_WIDTH=${SCREEN_WIDTH:-1024}
      - SCREEN_HEIGHT=${SCREEN_HEIGHT:-600}
    ports:
      - "5900:5900"
      - "6080:6080"
    shm_size: "512m"
    volumes:
      - chromium-profile:/profile
    restart: unless-stopped

volumes:
  chromium-profile:
